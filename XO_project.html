<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XO Game 3D</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="XO_project.css">
  <script src="XO_project.js"></script>
</head>
<body>

<canvas id="three-canvas"></canvas>

<div class="game-wrapper">
  <h1 class="title">XO ARENA</h1>
  <div class="panel">
    <!-- Scoreboard -->
    <div class="scoreboard">
      <div class="score-item">
        <div class="score-label">PLAYER X</div>
        <div class="score-val score-x" id="score-x">0</div>
      </div>
      <div class="score-item">
        <div class="score-label">DRAWS</div>
        <div class="score-val score-d" id="score-d">0</div>
      </div>
      <div class="score-item">
        <div class="score-label">PLAYER O</div>
        <div class="score-val score-o" id="score-o">0</div>
      </div>
    </div>

    <div class="separator">· · · · · · · · · · · ·</div>

    <!-- Player selection -->
    <div class="player-select">
      <button class="player-btn x-btn" id="choose-x" onclick="choosePlayer('X')">✕ PLAY X</button>
      <button class="player-btn o-btn" id="choose-o" onclick="choosePlayer('O')">○ PLAY O</button>
    </div>

    <!-- Turn indicator -->
    <div class="turn-indicator" id="turn-indicator">SELECT X OR O TO START</div>

    <!-- Grid -->
    <div class="grid" id="grid">
      <button class="cell" id="c0" onclick="makeMove(0)"></button>
      <button class="cell" id="c1" onclick="makeMove(1)"></button>
      <button class="cell" id="c2" onclick="makeMove(2)"></button>
      <button class="cell" id="c3" onclick="makeMove(3)"></button>
      <button class="cell" id="c4" onclick="makeMove(4)"></button>
      <button class="cell" id="c5" onclick="makeMove(5)"></button>
      <button class="cell" id="c6" onclick="makeMove(6)"></button>
      <button class="cell" id="c7" onclick="makeMove(7)"></button>
      <button class="cell" id="c8" onclick="makeMove(8)"></button>
    </div>

    <!-- Status -->
    <div id="status"></div>

    <!-- Buttons -->
    <div class="btn-row">
      <button class="btn btn-play" onclick="checkWinner()">CHECK RESULT</button>
      <button class="btn btn-restart" onclick="restartGame()">↺ RESTART</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</body>
</html>
